[global]
server_name = "localhost"
database_path = "/data"
port = [6167]
address = "0.0.0.0"

# Local-only: no federation
allow_federation = false

# Registration via token (used by jack)
registration_token = "jack-local-dev"
allow_registration = true

# No TLS — accessed directly on localhost
# If you put a reverse proxy in front, configure TLS there

max_request_size = 20_000_000
allow_room_creation = true
