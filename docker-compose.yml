services:
  tuwunel:
    image: jevolk/tuwunel:latest
    container_name: tuwunel
    restart: unless-stopped
    command: ["-c", "/etc/tuwunel/tuwunel.toml"]
    ports:
      - "6167:6167"
    volumes:
      - tuwunel-data:/data
      - ./tuwunel/tuwunel.toml:/etc/tuwunel/tuwunel.toml:ro
    networks:
      - infra

networks:
  infra:
    name: dotfiles-infra

volumes:
  tuwunel-data:
